{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Senha redefinida | VestPolo</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background:
                linear-gradient(135deg, rgba(17,17,17,0.82), rgba(17,17,17,0.58)),
                url("{% static 'img/banner-hover.png' %}");
            background-size: cover;
            background-position: center;
            margin: 0;
            color: #222;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 32px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.30);
            box-shadow: 0 18px 45px rgba(0,0,0,0.24);
        }

        .brand-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: fit-content;
            margin: 0 auto 18px;
            color: #111;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            white-space: nowrap;
        }

        .brand-card img {
            height: 34px;
            width: auto;
            border-radius: 5px;
            flex: 0 0 auto;
        }

        h1 {
            margin-top: 0;
        }

        p {
            color: #666;
        }

        .btn-login {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 18px;
            background: #25D366;
            color: white;
            padding: 13px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-login:hover {
            background: #1ebe5d;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="{% url 'home' %}" class="brand-card">
        <img src="{% static 'img/logo_vestpolo.png' %}" alt="VestPolo">
        <span>VestPolo</span>
    </a>

    <h1>Senha alterada com sucesso</h1>

    <p>Agora você já pode entrar usando sua nova senha.</p>

    <a href="{% url 'login' %}" class="btn-login"><i class="fa-solid fa-right-to-bracket"></i> Ir para o login</a>
</div>

</body>
</html>
