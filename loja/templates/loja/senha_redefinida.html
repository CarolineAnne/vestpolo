{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Senha redefinida | VestPolo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            color: #222;
        }

        .container {
            max-width: 430px;
            margin: 90px auto;
            background: white;
            padding: 32px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0,0,0,0.10);
        }

        .brand-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: fit-content;
            margin: 0 auto 18px;
            color: #111;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            white-space: nowrap;
        }

        .brand-card img {
            height: 34px;
            width: auto;
            border-radius: 5px;
            flex: 0 0 auto;
        }

        h1 {
            margin-top: 0;
        }

        p {
            color: #666;
        }

        a {
            display: inline-block;
            margin-top: 18px;
            background: #111;
            color: white;
            padding: 13px 20px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            background: #25D366;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="{% url 'home' %}" class="brand-card">
        <img src="{% static 'img/logo_vestpolo.png' %}" alt="VestPolo">
        <span>VestPolo</span>
    </a>

    <h1>Senha alterada com sucesso</h1>

    <p>Agora você já pode entrar usando sua nova senha.</p>

    <a href="{% url 'login' %}">Ir para o login</a>
</div>

</body>
</html>
