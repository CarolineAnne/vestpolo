{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Esqueci minha senha | VestPolo</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background:
                linear-gradient(135deg, rgba(17,17,17,0.82), rgba(17,17,17,0.58)),
                url("{% static 'img/banner-hover.png' %}");
            background-size: cover;
            background-position: center;
            margin: 0;
            color: #222;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.30);
            box-shadow: 0 18px 45px rgba(0,0,0,0.24);
        }

        .brand-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: fit-content;
            margin: 0 auto 18px;
            color: #111;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            white-space: nowrap;
        }

        .brand-card img {
            height: 34px;
            width: auto;
            border-radius: 5px;
            flex: 0 0 auto;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            text-align: center;
        }

        p {
            color: #666;
            line-height: 1.5;
            text-align: center;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 13px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }

        input:focus {
            border-color: #25D366;
            box-shadow: 0 0 0 3px rgba(37,211,102,0.18);
        }

        button {
            width: 100%;
            background: #25D366;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: #25D366;
        }

        .voltar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 18px;
            color: #111;
            font-weight: bold;
            text-decoration: none;
        }

        .voltar:hover {
            color: #128a3c;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="{% url 'home' %}" class="brand-card">
        <img src="{% static 'img/logo_vestpolo.png' %}" alt="VestPolo">
        <span>VestPolo</span>
    </a>

    <h1>Esqueci minha senha</h1>

    <p>Informe seu e-mail cadastrado. Enviaremos um link para você criar uma nova senha.</p>

    <form method="post">
        {% csrf_token %}

        <label for="id_email">E-mail</label>
        {{ form.email }}

        <button type="submit"><i class="fa-solid fa-paper-plane"></i> Enviar link de recuperacao</button>
    </form>

    <a href="{% url 'login' %}" class="voltar"><i class="fa-solid fa-arrow-left"></i> Voltar para o login</a>
</div>

</body>
</html>
