{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VestPolo</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background:
                linear-gradient(135deg, rgba(17,17,17,0.82), rgba(17,17,17,0.58)),
                url("{% static 'img/banner-hover.png' %}");
            background-size: cover;
            background-position: center;
            margin: 0;
            color: #222;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.30);
            box-shadow: 0 18px 45px rgba(0,0,0,0.24);
        }

        .brand-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: fit-content;
            margin: 0 auto 18px;
            color: #111;
            font-size: 24px;
            font-weight: bold;
            white-space: nowrap;
        }

        .brand-card img {
            height: 34px;
            width: auto;
            border-radius: 5px;
            flex: 0 0 auto;
        }

        .brand-card:hover {
            text-decoration: none;
        }

        h1 {
            text-align: center;
            margin: 0 0 25px;
            font-size: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 13px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }

        input:focus {
            border-color: #25D366;
            box-shadow: 0 0 0 3px rgba(37,211,102,0.18);
        }

        .password-field {
            position: relative;
        }

        .password-field input {
            padding-right: 48px;
        }

        button {
            width: 100%;
            margin-top: 22px;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: #1ebe5d;
        }

        .password-toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            margin: 0;
            padding: 0;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #128a3c;
            box-shadow: none;
        }

        .password-toggle:hover {
            background: #eaf8ef;
            color: #111;
        }

        a {
            color: #111;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .msg {
            color: red;
            text-align: center;
            font-size: 14px;
            margin: 8px 0;
        }

        .link-cadastro {
            text-align: center;
            margin: 20px 0 0;
            font-size: 15px;
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
                padding: 20px 12px;
            }

            .container {
                padding: 24px 20px;
                border-radius: 14px;
                margin-top: 20px;
            }

            h1 {
                font-size: 26px;
            }

            input {
                padding: 12px;
                font-size: 14px;
            }

            button {
                padding: 13px;
                font-size: 14px;
            }

            .password-toggle {
                width: 38px;
                height: 38px;
                padding: 0;
                font-size: 15px;
            }

            .link-cadastro {
                font-size: 14px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 20px 16px;
            }

            h1 {
                font-size: 24px;
            }
        }

        .btn-voltar {
            position: fixed;
            top: 22px;
            left: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #111;
            color: white;
            padding: 11px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            z-index: 1000;
            transition: 0.3s ease;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .btn-voltar:hover {
            background: #25D366;
            color: #111;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .btn-voltar {
                position: static;
                display: inline-flex;
                margin: 16px 0 0 16px;
                padding: 10px 14px;
                font-size: 13px;
            }
        }

        .link-extra {
            text-align: center;
            margin-top: 14px;
        }

        .link-extra a {
            color: #128a3c;
            font-weight: bold;
            text-decoration: none;
        }

        .link-extra a:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
</head>

<body>

    <a href="{% url 'home' %}" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Voltar para loja</a>

    <div class="container">
        <a href="{% url 'home' %}" class="brand-card">
            <img src="{% static 'img/logo_vestpolo.png' %}" alt="VestPolo">
            <span>VestPolo</span>
        </a>

        <h1>Entrar</h1>

        {% for message in messages %}
            <p class="msg">{{ message }}</p>
        {% endfor %}

        <form method="POST">
            {% csrf_token %}

            <label>E-mail</label>
            <input type="email" name="email" required>

            <label for="senhaLogin">Senha</label>
            <div class="password-field">
                <input type="password" id="senhaLogin" name="senha" autocomplete="current-password" required>
                <button type="button" class="password-toggle" data-password-toggle="senhaLogin" aria-label="Mostrar senha">
                    <i class="fa-regular fa-eye"></i>
                </button>
            </div>

            <button type="submit"><i class="fa-solid fa-right-to-bracket"></i> Entrar</button>

            <p class="link-extra">
                <a href="{% url 'password_reset' %}">Esqueci minha senha</a>
            </p>
        </form>

        <p class="link-cadastro">
            Não tem conta? <a href="{% url 'cadastro' %}">Cadastrar</a>
        </p>
    </div>

    <script>
        document.querySelectorAll('[data-password-toggle]').forEach(function (button) {
            button.addEventListener('click', function () {
                var input = document.getElementById(button.dataset.passwordToggle);
                var icon = button.querySelector('i');
                var showing = input.type === 'text';

                input.type = showing ? 'password' : 'text';
                button.setAttribute('aria-label', showing ? 'Mostrar senha' : 'Ocultar senha');
                icon.className = showing ? 'fa-regular fa-eye' : 'fa-regular fa-eye-slash';
            });
        });
    </script>

{% include 'loja/includes/footer.html' %}
</body>
</html>
