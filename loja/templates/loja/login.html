<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VestPolo</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            color: #222;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.10);
        }

        h1 {
            text-align: center;
            margin: 0 0 25px;
            font-size: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 13px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
        }

        button {
            width: 100%;
            margin-top: 22px;
            background: #111;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
        }

        a {
            color: #111;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .msg {
            color: red;
            text-align: center;
            font-size: 14px;
            margin: 8px 0;
        }

        .link-cadastro {
            text-align: center;
            margin: 20px 0 0;
            font-size: 15px;
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
                padding: 20px 12px;
            }

            .container {
                padding: 24px 20px;
                border-radius: 14px;
                margin-top: 20px;
            }

            h1 {
                font-size: 26px;
            }

            input {
                padding: 12px;
                font-size: 14px;
            }

            button {
                padding: 13px;
                font-size: 14px;
            }

            .link-cadastro {
                font-size: 14px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 20px 16px;
            }

            h1 {
                font-size: 24px;
            }
        }

        .btn-voltar {
            position: fixed;
            top: 22px;
            left: 22px;
            background: #111;
            color: white;
            padding: 11px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            z-index: 1000;
            transition: 0.3s ease;
        }

        .btn-voltar:hover {
            background: #25D366;
            color: white;
        }

        @media (max-width: 600px) {
            .btn-voltar {
                position: static;
                display: inline-flex;
                margin: 16px 0 0 16px;
                padding: 10px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <a href="{% url 'home' %}" class="btn-voltar">⬅ Voltar para loja</a>

    <div class="container">
        <h1>Entrar</h1>

        {% for message in messages %}
            <p class="msg">{{ message }}</p>
        {% endfor %}

        <form method="POST">
            {% csrf_token %}

            <label>E-mail</label>
            <input type="email" name="email" required>

            <label>Senha</label>
            <input type="password" name="senha" required>

            <button type="submit">Entrar</button>
        </form>

        <p class="link-cadastro">
            Não tem conta? <a href="{% url 'cadastro' %}">Cadastrar</a>
        </p>
    </div>

</body>
</html>
