{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Favoritos | VestPolo</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            color: #222;
        }

        img {
            max-width: 100%;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        header {
            background: #111;
            color: white;
            padding: 22px 20px;
            text-align: center;
        }

        .brand-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            white-space: nowrap;
            margin-bottom: 10px;
        }

        .brand-logo {
            height: 32px;
            width: auto;
            border-radius: 5px;
            flex: 0 0 auto;
        }

        header h1 {
            margin: 0;
            font-size: 30px;
        }

        .topo {
            text-align: center;
            margin: 24px auto 10px;
            padding: 0 16px;
        }

        button {
            background: #111;
            color: white;
            border: none;
            padding: 11px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
        }

        .container {
            width: 92%;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
            padding: 24px 0 50px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            min-width: 0;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.14);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            background: #eee;
            display: block;
        }

        .card h3 {
            margin: 14px 0 8px;
            font-size: 18px;
            line-height: 1.3;
            word-break: break-word;
        }

        .price {
            color: #128a3c;
            font-weight: bold;
            font-size: 19px;
            margin: 8px 0 16px;
        }

        .card button {
            width: 100%;
            background: #ffefef;
            color: #b00020;
            padding: 11px;
            border-radius: 10px;
        }

        .card button:hover {
            background: #b00020;
            color: white;
        }

        .mensagem {
            grid-column: 1 / -1;
            background: white;
            text-align: center;
            margin: 10px auto;
            padding: 35px 20px;
            border-radius: 16px;
            font-size: 18px;
            color: #555;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 26px;
            }

            .container {
                width: calc(100% - 24px);
                grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
                gap: 16px;
                padding: 20px 0 40px;
            }

            .card img {
                height: 200px;
            }
        }

        @media (max-width: 520px) {
            header {
                padding: 20px 16px;
            }

            header h1 {
                font-size: 24px;
            }

            .topo {
                margin: 18px auto 8px;
            }

            .topo button {
                width: 100%;
                max-width: 320px;
            }

            .container {
                width: calc(100% - 24px);
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .card {
                padding: 14px;
                border-radius: 14px;
            }

            .card img {
                height: 190px;
            }

            .card h3 {
                font-size: 17px;
            }

            .price {
                font-size: 18px;
            }

            .mensagem {
                font-size: 16px;
                padding: 28px 18px;
            }
        }

        @media (max-width: 360px) {
            .container {
                width: calc(100% - 16px);
            }

            .card img {
                height: 175px;
            }

            header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

<header>
    <a href="{% url 'home' %}" class="brand-link">
        <img src="{% static 'img/logo_vestpolo.png' %}" alt="VestPolo" class="brand-logo">
        <span>VestPolo</span>
    </a>
    <h1>❤️ Meus Favoritos</h1>
</header>

<div class="topo">
    <a href="{% url 'home' %}">
        <button>⬅ Voltar para loja</button>
    </a>
</div>

<div class="container">

    {% for produto in produtos %}
        <div class="card">
            <a href="{% url 'produto_detalhe' produto.id %}">

                {% if produto.imagem %}
                    <img src="{{ produto.imagem.url }}" alt="{{ produto.nome }}">
                {% else %}
                    <img src="https://via.placeholder.com/250x200?text=Sem+Imagem" alt="Sem imagem">
                {% endif %}

                <h3>{{ produto.nome }}</h3>
                <p class="price">R$ {{ produto.preco }}</p>
            </a>

            <a href="{% url 'favoritar' produto.id %}">
                <button>❌ Remover dos favoritos</button>
            </a>
        </div>
    {% empty %}
        <p class="mensagem">Você ainda não favoritou nenhum produto 😢</p>
    {% endfor %}

</div>

</body>
</html>
