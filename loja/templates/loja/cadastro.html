{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | VestPolo</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: Arial, sans-serif;
            background:
                linear-gradient(135deg, rgba(17,17,17,0.88), rgba(17,17,17,0.62)),
                url("{% static 'img/personalizados-destaque.png' %}");
            background-size: cover;
            background-position: center;
            margin: 0;
            color: #222;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 460px;
            background: white;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 16px 42px rgba(0,0,0,0.22);
            border: 1px solid rgba(255,255,255,0.36);
        }

        .brand-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: fit-content;
            margin: 0 auto 18px;
            color: #111;
            font-size: 24px;
            font-weight: bold;
            white-space: nowrap;
        }

        .brand-card img {
            height: 34px;
            width: auto;
            border-radius: 5px;
            flex: 0 0 auto;
        }

        .brand-card:hover {
            text-decoration: none;
        }

        h1 {
            text-align: center;
            margin: 0 0 8px;
            font-size: 30px;
        }

        .intro {
            text-align: center;
            margin: 0 0 24px;
            color: #666;
            line-height: 1.5;
            font-size: 14px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 13px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            border-color: #25D366;
            outline: 2px solid rgba(37, 211, 102, 0.16);
        }

        button {
            width: 100%;
            margin-top: 22px;
            background: #25D366;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1ebe5d;
        }

        a {
            color: #111;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .msg {
            color: red;
            text-align: center;
            font-size: 14px;
            margin: 8px 0;
        }

        .link-login {
            text-align: center;
            margin: 20px 0 0;
            font-size: 15px;
        }

        @media (max-width: 520px) {
            body {
                align-items: flex-start;
                padding: 20px 12px;
            }

            .container {
                padding: 24px 20px;
                border-radius: 14px;
                margin-top: 20px;
            }

            h1 {
                font-size: 26px;
            }

            input {
                padding: 12px;
                font-size: 14px;
            }

            button {
                padding: 13px;
                font-size: 14px;
            }

            .link-login {
                font-size: 14px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 20px 16px;
            }

            h1 {
                font-size: 24px;
            }
        }

        .btn-voltar {
            position: fixed;
            top: 22px;
            left: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(17,17,17,0.90);
            color: white;
            padding: 11px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            z-index: 1000;
            transition: 0.3s ease;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
        }

        .btn-voltar:hover {
            background: #25D366;
            color: #111;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .btn-voltar {
                position: static;
                display: inline-flex;
                margin: 16px 0 0 16px;
                padding: 10px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <a href="{% url 'home' %}" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Voltar para loja</a>

    <div class="container">
        <a href="{% url 'home' %}" class="brand-card">
            <img src="{% static 'img/logo_vestpolo.png' %}" alt="VestPolo">
            <span>VestPolo</span>
        </a>

        <h1>Criar conta</h1>
        <p class="intro">Salve favoritos, acompanhe pedidos e finalize suas polos com mais facilidade.</p>

        {% for message in messages %}
            <p class="msg">{{ message }}</p>
        {% endfor %}

        <form method="POST">
            {% csrf_token %}

            <label>Nome</label>
            <input type="text" name="nome" required>

            <label>E-mail</label>
            <input type="email" name="email" required>

            <label>Senha</label>
            <input type="password" name="senha" required>

            <button type="submit"><i class="fa-solid fa-user-plus"></i> Criar conta</button>
        </form>

        <p class="link-login">
            Já tem conta? <a href="{% url 'login' %}">Entrar</a>
        </p>
    </div>

</body>
</html>
